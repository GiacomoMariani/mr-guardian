version: 1

rules:
  - id: PYTHON-PRINT-001
    type: deterministic
    implementation: python_print
    enabled: true
    severity: warning
    source: python-policy.yml#PYTHON-PRINT-001
    description: Python code should use logging instead of newly introduced print calls.
    match:
      changed_files:
        - "**/*.py"
      added_lines_contain:
        - "print("

  - id: PYTHON-DESIGN-LLM-001
    type: llm
    enabled: true
    severity: info
    source: python-policy.yml#PYTHON-DESIGN-LLM-001
    description: Check whether the Python change adds unnecessary abstraction.
    prompt: |
      Review the provided Python diff for unnecessary abstraction, over-engineering, or unrelated scope.
      Only report issues grounded in the diff.
    inputs:
      include_diff: true
      include_changed_files: true
    output_contract:
      max_findings: 3
      allow_blocking: false
