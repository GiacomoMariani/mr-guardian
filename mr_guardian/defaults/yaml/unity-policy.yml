version: 1

rules:
  - id: SIZE-FILES-001
    type: deterministic
    implementation: size_changed_files
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#SIZE-FILES-001
    description: Large file-count changes should be split or explained.
    parameters:
      threshold:
        max_changed_files: 15

  - id: SIZE-LINES-001
    type: deterministic
    implementation: size_changed_lines
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#SIZE-LINES-001
    description: Large line-count changes should be split or explained.
    parameters:
      threshold:
        max_changed_lines: 500

  - id: SIZE-DIRECTORIES-001
    type: deterministic
    implementation: size_changed_directories
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#SIZE-DIRECTORIES-001
    description: Broad directory changes should be split or explained.
    parameters:
      threshold:
        max_changed_directories: 5

  - id: MR-META-001
    type: deterministic
    implementation: mr_required_section
    evaluation: mr_structure
    enabled: true
    severity: blocking
    source: unity-policy.yml#MR-META-001
    description: MR must include a test plan.
    parameters:
      require:
        mr_sections:
          - Test Plan
      suggested_fix: |
        ### Test Plan

        - [ ] Confirm the project compiles.
        - [ ] Run the affected Unity scene.
        - [ ] Test the main success path.
        - [ ] Check the Unity Console for errors.

  - id: MR-META-002
    type: deterministic
    implementation: mr_required_section
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#MR-META-002
    description: MR must include a summary.
    parameters:
      require:
        mr_sections:
          - Summary

  - id: MR-META-003
    type: deterministic
    implementation: mr_required_section
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#MR-META-003
    description: MR must include linked issue context.
    parameters:
      require:
        mr_sections:
          - Linked Issue

  - id: MR-META-004
    type: deterministic
    implementation: mr_required_section
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#MR-META-004
    description: MR must include risk notes.
    parameters:
      require:
        mr_sections:
          - Risk

  - id: MR-META-005
    type: deterministic
    implementation: mr_required_section
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#MR-META-005
    description: MR must include reviewer notes.
    parameters:
      require:
        mr_sections:
          - Reviewer Notes

  - id: MR-TICKET-001
    type: deterministic
    implementation: mr_title_ticket_key
    evaluation: mr_structure
    enabled: true
    severity: blocking
    source: unity-policy.yml#MR-TICKET-001
    description: GitLab MR titles must include a ticket key.
    parameters:
      title_pattern: "\\bTK-\\d+\\b"
      required_review_scopes:
        - gitlab-webhook

  - id: UNITY-SCENE-001
    type: deterministic
    implementation: changed_files_require_mr_section
    evaluation: mr_structure
    enabled: true
    severity: high
    source: unity-policy.yml#UNITY-SCENE-001
    description: Scene changes require manual validation.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.unity"
      require:
        mr_sections:
          - Manual Validation
      suggested_fix: |
        ### Manual Validation

        - [ ] Opened the affected scene.
        - [ ] Entered Play Mode.
        - [ ] Verified the changed behavior.
        - [ ] Checked the Unity Console for errors.

  - id: UNITY-PREFAB-001
    type: deterministic
    implementation: changed_files_require_validation
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-PREFAB-001
    description: Prefab changes require validation evidence.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.prefab"

  - id: UNITY-PROJECTSETTINGS-001
    type: deterministic
    implementation: changed_files_require_mr_section
    evaluation: mr_structure
    enabled: true
    severity: high
    source: unity-policy.yml#UNITY-PROJECTSETTINGS-001
    description: ProjectSettings changes require explanation.
    parameters:
      match:
        changed_files:
          - "ProjectSettings/**"
      require:
        mr_sections:
          - Risk
          - Reviewer Notes

  - id: UNITY-TESTS-001
    type: deterministic
    implementation: production_code_requires_tests_or_validation
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-TESTS-001
    description: Gameplay code changes require tests or manual validation.
    parameters:
      match:
        changed_files:
          - "Assets/Scripts/**"
          - "Assets/**/Scripts/**"
      require_any:
        changed_files:
          - "Assets/Tests/**"
          - "Assets/**/Tests/**"
          - "Tests/**"
        mr_sections:
          - Manual Validation

  - id: UNITY-EVENTS-001
    type: deterministic
    implementation: unity_event_subscription
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-EVENTS-001
    description: Event subscriptions should have a visible unsubscribe path.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.cs"
        subscribe_tokens:
          - "+="
          - ".AddListener("
          - "AddEventListener("
        unsubscribe_tokens:
          - "-="
          - ".RemoveListener("
          - "RemoveEventListener("

  - id: UNITY-PERF-GC-001
    type: deterministic
    implementation: unity_per_frame_allocation
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-PERF-GC-001
    description: Avoid likely GC allocations inside Unity per-frame callbacks.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.cs"
        callbacks:
          - "Update"
          - "LateUpdate"
          - "FixedUpdate"
        allocation_tokens:
          - "new "
          - ".Where("
          - ".Select("
          - ".ToList("
          - ".ToArray("
          - "string.Format("
          - "$\""

  - id: UNITY-POOLING-001
    type: deterministic
    implementation: unity_runtime_instantiation
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-POOLING-001
    description: Runtime Instantiate or Destroy usage should be checked for pooling needs.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.cs"
        pooling_tokens:
          - "Instantiate("
          - "Destroy("
        runtime_method_name_contains:
          - "Update"
          - "LateUpdate"
          - "FixedUpdate"
          - "Spawn"
          - "Despawn"
          - "Fire"
          - "Shoot"
          - "OnTrigger"
          - "OnCollision"

  - id: UNITY-RESOURCES-001
    type: deterministic
    implementation: unity_resources_load
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-RESOURCES-001
    description: Avoid newly introduced Resources.Load usage without an explicit asset-loading plan.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.cs"
        resource_tokens:
          - "Resources.Load"
          - "Resources.LoadAll"

  - id: CSHARP-DEBUG-001
    type: deterministic
    implementation: csharp_debug_log
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#CSHARP-DEBUG-001
    description: Debug.Log statements should not be introduced in production code unless explicitly allowed.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.cs"
        added_lines_contain:
          - "Debug.Log"
          - "print("

  - id: CSHARP-GETCOMPONENT-001
    type: deterministic
    implementation: csharp_get_component
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#CSHARP-GETCOMPONENT-001
    description: Cache GetComponent calls in Awake when possible.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.cs"
        added_lines_contain:
          - "GetComponent<"

  - id: CSHARP-SIZE-001
    type: deterministic
    implementation: csharp_class_size
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#CSHARP-SIZE-001
    description: C# classes should stay reviewable in size.
    parameters:
      threshold:
        max_class_lines: 300

  - id: CSHARP-SIZE-002
    type: deterministic
    implementation: csharp_method_size
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#CSHARP-SIZE-002
    description: C# methods should stay focused and reviewable.
    parameters:
      threshold:
        max_method_lines: 50

  - id: CSHARP-PARAMETERS-001
    type: deterministic
    implementation: csharp_method_parameters
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#CSHARP-PARAMETERS-001
    description: C# methods should avoid excessive parameters.
    parameters:
      threshold:
        max_method_parameters: 5

  - id: CSHARP-PUBLIC-FIELDS-001
    type: deterministic
    implementation: csharp_public_fields
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#CSHARP-PUBLIC-FIELDS-001
    description: Avoid public fields in C# production code unless explicitly intended.
    parameters:
      match:
        changed_files:
          - "Assets/**/*.cs"

  - id: AI-CODE-001
    type: deterministic
    implementation: ai_code_large_change
    evaluation: mr_structure
    enabled: true
    severity: warning
    source: unity-policy.yml#AI-CODE-001
    description: AI-assisted code should not add unnecessary scope.
    parameters:
      match:
        changed_files_count_greater_than: 15

  - id: AI-CODE-LLM-001
    type: llm
    evaluation: mr_structure
    enabled: true
    severity: info
    source: unity-policy.yml#AI-CODE-LLM-001
    description: Check whether the change appears broader than the stated intent.
    prompt: |
      Review the provided diff for unrelated scope, unnecessary abstractions, or generated code that is not clearly connected to the change.
      Only report issues grounded in the diff.
    parameters:
      inputs:
        include_diff: true
        include_changed_files: true
      output_contract:
        max_findings: 3
        allow_blocking: false

  - id: UNITY-LIFECYCLE-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-LIFECYCLE-LLM-001
    description: Check whether Unity lifecycle changes rely on fragile execution order assumptions.
    prompt: |
      Review the provided Unity C# diff for fragile lifecycle coupling or execution order assumptions involving Awake, OnEnable, Start, Update, LateUpdate, FixedUpdate, OnDisable, or script execution order.
      Look for initialization that depends on another component being ready too early, event setup that may run before dependencies exist, physics logic in the wrong update loop, or per-frame behavior that belongs in an event-driven path.
      Only report issues grounded in the diff.
    parameters:
      inputs:
        include_diff: true
        include_changed_files: true
      output_contract:
        max_findings: 3
        allow_blocking: false

  - id: UNITY-UI-PERF-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-UI-PERF-LLM-001
    description: Check Unity UI changes for performance and validation risk.
    prompt: |
      Review the provided Unity diff for UI performance risks involving Canvas rebuilds, dynamic layout updates, unnecessary raycast targets, expensive UI updates in per-frame code, UI Toolkit or uGUI hierarchy changes, TextMeshPro updates, or UI prefab changes that should be manually profiled.
      If the diff does not touch Unity UI code or UI assets, return no findings.
      Only report issues grounded in the diff.
    parameters:
      inputs:
        include_diff: true
        include_changed_files: true
      output_contract:
        max_findings: 3
        allow_blocking: false

  - id: UNITY-ASSET-LOADING-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-ASSET-LOADING-LLM-001
    description: Check broader Unity asset-loading changes for memory, lifecycle, and platform risk.
    prompt: |
      Review the provided Unity diff for asset-loading risks beyond direct Resources.Load usage.
      Focus on Addressables, AssetBundle usage, runtime loading paths, memory lifecycle, unload behavior, reference ownership, cache invalidation, and platform-specific content delivery or build-target risks.
      The deterministic UNITY-RESOURCES-001 rule handles direct Resources.Load and Resources.LoadAll matches; only report broader asset-loading issues grounded in the diff.
    parameters:
      inputs:
        include_diff: true
        include_changed_files: true
      output_contract:
        max_findings: 3
        allow_blocking: false

  - id: UNITY-PHYSICS-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-PHYSICS-LLM-001
    description: Check Unity physics changes for update-loop, query, movement, and collision risks.
    prompt: |
      Review the provided Unity diff for physics risks involving Update versus FixedUpdate usage, physics queries without explicit layer masks, excessive raycasts or casts, Rigidbody movement through transform changes, and collision or trigger behavior changes.
      If the diff does not touch Unity physics code, physics components, collision logic, trigger logic, Rigidbody movement, raycasts, casts, or related scene/prefab setup, return no findings.
      Only report issues grounded in the diff.
    parameters:
      inputs:
        include_diff: true
        include_changed_files: true
      output_contract:
        max_findings: 3
        allow_blocking: false

  - id: UNITY-SCRIPTABLEOBJECT-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-SCRIPTABLEOBJECT-LLM-001
    description: Check ScriptableObject changes for hidden state, runtime mutation, and editor/runtime leakage.
    prompt: |
      Review the provided Unity diff for ScriptableObject architecture risks.
      Check whether ScriptableObject usage is appropriate for data, configuration, or event-channel patterns; look for hidden global state, mutable runtime state stored in asset files, non-stateless ScriptableObject patterns, and editor/runtime state leakage.
      Return an advisory finding when changed ScriptableObject usage appears non-stateless or could persist runtime state back into assets.
      Only report issues grounded in the diff.
    parameters:
      inputs:
        include_diff: true
        include_changed_files: true
      output_contract:
        max_findings: 3
        allow_blocking: false


  # ###########################################################################
  # NEW UNITY RULES — promoted from personal-notes/proposed-unity-rules.draft.yml
  # 21 LLM rules (enabled) + 4 deterministic placeholders (enabled: false until
  # implemented and registered; the engine dispatches by rule ID, not impl name).
  # ###########################################################################
  # =========================================================================
  # COMMON  — fires on lots of MRs
  # =========================================================================

  - id: UNITY-FIND-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: warning          # was info
    source: unity-policy.yml#UNITY-FIND-LLM-001
    description: Flag expensive runtime object lookups.
    prompt: |
      Review the provided Unity C# diff for expensive object lookups such as
      GameObject.Find, FindObjectOfType, FindGameObjectsWithTag, transform.Find,
      and repeated Camera.main access, especially inside Update/LateUpdate/
      FixedUpdate or other hot paths. Prefer cached references resolved in
      Awake/Start or serialized in the inspector.
      Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: common

  - id: UNITY-LOCALIZATION-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-LOCALIZATION-LLM-001
    description: Flag hardcoded user-facing strings.
    prompt: |
      Review the provided Unity diff for hardcoded user-facing text (UI labels,
      dialogue, tooltips, button captions) assigned directly in code or set on
      Text/TMP components instead of being routed through a localization layer
      (string tables / keys). Ignore log messages, exception text, and editor-only
      strings. Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: common

  - id: UNITY-MAGIC-NUMBERS-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-MAGIC-NUMBERS-LLM-001
    description: Flag hardcoded gameplay constants that should be tunable.
    prompt: |
      Review the provided Unity diff for hardcoded gameplay/balance constants
      (speeds, costs, cooldowns, growth times, thresholds) embedded in code that
      designers would likely want to tune. Prefer [SerializeField] fields or
      ScriptableObject config. Do not flag genuine constants (math, array sizes,
      buffer lengths). Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: common

  # =========================================================================
  # UNCOMMON
  # =========================================================================

  - id: UNITY-NULLREF-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: high             # DECISION #1: requested `blocking`, but LLM rules
                               # cannot block. See deterministic stub at bottom.
    source: unity-policy.yml#UNITY-NULLREF-LLM-001
    description: Flag missing-reference / null-dereference risk.
    prompt: |
      Review the provided Unity C# diff for null-reference risk: serialized
      references that can ship unassigned and are used without a guard, results
      of GetComponent/GetComponentInChildren used without a null check, and
      TryGetComponent ignored. Call out the specific dereference that can throw.
      Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: uncommon

  - id: UNITY-ALLOC-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-ALLOC-LLM-001
    description: Flag hidden allocations in hot paths.
    prompt: |
      Review the provided Unity C# diff for hidden per-frame allocations beyond
      the simple token checks in UNITY-PERF-GC-001: LINQ chains, closures that
      capture state, boxing of structs/enums, params arrays, and enumerator
      allocations inside Update/LateUpdate/FixedUpdate or other hot paths.
      Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: uncommon

  - id: UNITY-TIME-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-TIME-LLM-001
    description: Flag frame-rate-dependent logic / deltaTime misuse.
    prompt: |
      Review the provided Unity C# diff for time handling bugs: movement, growth,
      timers, or interpolation that are not scaled by Time.deltaTime (or use it
      where fixedDeltaTime is correct), and logic that silently assumes a fixed
      frame rate or a particular Time.timeScale. Only report issues grounded in
      the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: uncommon

  - id: UNITY-ASSET-IMPORT-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-ASSET-IMPORT-LLM-001
    description: Flag risky texture/sprite/audio import settings.
    prompt: |
      Review the provided Unity diff (including .meta files) for asset import
      risks: uncompressed or oversized textures, missing or inconsistent sprite
      atlas membership, inconsistent pixels-per-unit, mipmaps on UI sprites, and
      decompress-on-load / heavy audio import settings. If the diff touches no
      asset or .meta files, return no findings. Only report issues grounded in
      the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: uncommon

  - id: UNITY-EXCEPTION-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-EXCEPTION-LLM-001
    description: Flag error-handling smells.
    prompt: |
      Review the provided Unity C# diff for error-handling smells: empty catch
      blocks, catching System.Exception broadly, swallowing exceptions without
      logging or rethrow, try/catch inside per-frame hot paths, and exceptions
      used for normal control flow. Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: uncommon

  - id: UNITY-ODIN-FIELD-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: info
    source: unity-policy.yml#UNITY-ODIN-FIELD-LLM-001
    description: Flag fields that will not show in the Odin Inspector.
    prompt: |
      Review the provided Unity C# diff for fields that are intended to be edited
      in the inspector but will not appear in Sirenix Odin's inspector: private
      or internal fields without [SerializeField] or [ShowInInspector], auto
      properties without [ShowInInspector], and non-serializable types shown
      without [ShowInInspector]. Assume this project uses Odin Inspector. Only
      report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: uncommon

  - id: UNITY-INPUT-001
    type: deterministic
    implementation: unity_raw_input_usage     # dispatched by rule ID via registry -> AddedLineTokenRule
    evaluation: coding
    enabled: true
    severity: blocking         # promoted from the old LLM hygiene rule
    source: unity-policy.yml#UNITY-INPUT-001
    description: Block newly introduced legacy/raw input API usage.
    # NOTE: overlaps UNITY-LEGACY-INPUT-LLM-001 (DECISION #2). This deterministic
    # rule is the hard gate on raw-input tokens; the LLM rule keeps the judgment
    # calls (FixedUpdate polling, no rebinding support) that tokens can't catch.
    parameters:
      match:
        changed_files: ["Assets/**/*.cs"]
        added_lines_contain:
          - "UnityEngine.Input."
          - "Input.GetKey"
          - "Input.GetButton"
          - "Input.GetAxis"
          - "Input.GetMouseButton"
          - "KeyCode."
      rarity: uncommon

  # =========================================================================
  # RARE  — subsystem-specific
  # =========================================================================

  - id: UNITY-COROUTINE-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-COROUTINE-LLM-001
    description: Flag coroutine / MEC lifecycle leaks.
    prompt: |
      Review the provided Unity C# diff for coroutine lifecycle risks. Cover both
      Unity coroutines (StartCoroutine without a matching stop, coroutines owned
      by objects that get disabled/destroyed mid-run, StartCoroutine in Update)
      and MEC / More Effective Coroutines (Timing.RunCoroutine, IEnumerator<float>,
      CoroutineHandle values that are never .Kill()ed or are not tied to a segment
      or gameObject). Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: rare

  - id: UNITY-MATERIAL-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-MATERIAL-LLM-001
    description: Flag material instancing leaks and missing MaterialPropertyBlock.
    prompt: |
      Review the provided Unity C# diff for renderer material risks: accessing
      renderer.material / .materials (which clones an instance) instead of
      sharedMaterial, instantiated materials / RenderTextures / Meshes that are
      never destroyed, and — importantly — per-renderer property changes
      (material.SetColor/SetFloat/SetTexture) that should go through a
      MaterialPropertyBlock to preserve batching. Flag missing MaterialPropertyBlock
      usage explicitly. Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: rare

  - id: UNITY-LEGACY-INPUT-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: warning
    source: unity-policy.yml#UNITY-LEGACY-INPUT-LLM-001
    description: Flag use of the legacy Input Manager over the new Input System.
    # NOTE: overlaps the deterministic UNITY-INPUT-001 (DECISION #2). Keep only
    # the judgment calls here if that rule is adopted.
    prompt: |
      Review the provided Unity C# diff for use of the legacy Input Manager
      (UnityEngine.Input, Input.GetKey/GetAxis/GetButton, hardcoded KeyCode) when
      the project standard is the new Input System (InputAction / PlayerInput).
      Also flag input polled in FixedUpdate (missed presses) and input with no
      rebinding path. Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: rare

  - id: UNITY-SINGLETON-LLM-001
    type: llm
    evaluation: coding
    enabled: true
    severity: warning          # was info — warn when a new singleton is added
    source: unity-policy.yml#UNITY-SINGLETON-LLM-001
    description: Warn when a new singleton / global mutable state is introduced.
    prompt: |
      Review the provided Unity C# diff for newly introduced singletons or global
      mutable state: a new static Instance property/field, a new MonoBehaviour
      singleton, or new static mutable collections/state. Note hidden coupling and
      state that may survive scene reloads unintentionally. Raise a warning when a
      new singleton is added. Only report issues grounded in the diff.
    parameters:
      inputs: { include_diff: true, include_changed_files: true }
      output_contract: { max_findings: 3, allow_blocking: false }
      rarity: rare

